app = "pretext-game"
primary_region = "ewr"

[build]
  dockerfile = "server/Dockerfile"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "performance-4x"
  memory = "8gb"

[env]
  PORT = "3001"
  NODE_ENV = "production"
